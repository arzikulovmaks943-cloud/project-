<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #1a001f, #000);
  font-family: Arial;
}

/* центр */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
}

/* кнопка */
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #ff2d55;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 25px #ff2d55;
}

/* скрытый подарок */
#gift {
  display: none;
  margin-top: 20px;
  font-size: 28px;
  color: #ff4d6d;
  text-shadow: 0 0 20px #ff4d6d;
  animation: fade 2s ease-in-out;
}

/* сердечки */
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 16px;
  animation: float 6s linear forwards;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

@keyframes fade {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="center">
  <h1>💖 спасибо за то что ты есть</h1>

  <button onclick="openGift()">Открыть подарок</button>

  <div id="gift">
    I LOVE YOU ❤️<br>
    ты самая прекрасная ✨
  </div>
</div>

<script>

function openGift() {
  document.getElementById("gift").style.display = "block";

  // поток сердечек
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 150);
}

</script>

</body>
</html>
