 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: radial-gradient(circle at center, #1a001f, #000);
  font-family: Arial;
}

/* центр текст */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
  z-index: 10;
}

.center h1 {
  color: #ff4d6d;
  font-size: 42px;
  text-shadow: 0 0 20px #ff4d6d;
  margin: 0;
}

.center p {
  opacity: 0.8;
}

/* счётчик */
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 18px;
  z-index: 20;
}

/* большое сердце */
.big-heart {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 120px;
  user-select: none;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

/* маленькие сердечки */
.heart {
  position: absolute;
  font-size: 18px;
  color: #ff2d55;
  animation: fall 4s linear forwards;
}

@keyframes pulse {
  0% { transform: translate(-50%,-50%) scale(1); }
  50% { transform: translate(-50%,-50%) scale(1.15); }
  100% { transform: translate(-50%,-50%) scale(1); }
}

@keyframes fall {
  from { transform: translateY(-50px); opacity: 1; }
  to { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="score">💖 Любовь: 0</div>

<div class="center">
  <h1>I LOVE YOU 💖</h1>
  <p>я люблю тебя, ты во всём справишься ✨</p>
</div>

<div class="big-heart" onclick="tapHeart()">💘</div>

<script>

let score = 0;

/* тап по большому сердцу */
function tapHeart() {
  score++;
  document.getElementById("score").innerText = "💖 Любовь: " + score;

  // эффект маленьких сердечек
  for (let i = 0; i < 5; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💘";

    h.style.left = (window.innerWidth/2 + (Math.random()*100 - 50)) + "px";
    h.style.top = (window.innerHeight/2 + (Math.random()*100 - 50)) + "px";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 4000);
  }
}

/* постоянные падающие сердечки */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerText = "💘";

  h.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 4000);
}, 300);

</script>

</body>
</html>
