<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: radial-gradient(circle at center, #1a001f, #000);
  font-family: Arial;
}

/* текст по центру */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
  z-index: 10;
}

.center-text h1 {
  color: #ff4d6d;
  font-size: 42px;
  text-shadow: 0 0 20px #ff4d6d;
  margin: 0;
}

.center-text p {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.85;
}

/* контейнер сердца */
#container {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 300px;
  height: 300px;
  transform: translate(-50%,-50%);
}

/* маленькие 💘 */
.heart {
  position: absolute;
  font-size: 14px;
  color: #ff2d55;
  animation: pop 1.5s ease forwards;
}

/* появление */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* лёгкое мерцание текста */
@keyframes glow {
  0% { text-shadow: 0 0 10px #ff4d6d; }
  50% { text-shadow: 0 0 30px #ff4d6d; }
  100% { text-shadow: 0 0 10px #ff4d6d; }
}

.center-text h1 {
  animation: glow 2s infinite;
}
</style>
</head>

<body>

<div class="center-text">
  <h1>I LOVE YOU 💖</h1>
  <p>я люблю тебя, ты во всём справишься ✨</p>
</div>

<div id="container"></div>

<script>
const container = document.getElementById("container");

function createHeartShape() {
  let count = 300;

  for (let i = 0; i < count; i++) {

    let t = Math.random() * Math.PI * 2;

    // формула сердца
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t);

    let el = document.createElement("div");
    el.className = "heart";
    el.innerText = "💘";

    el.style.left = (150 + x * 8) + "px";
    el.style.top  = (150 - y * 8) + "px";

    el.style.fontSize = (10 + Math.random() * 12) + "px";

    container.appendChild(el);
  }
}

createHeartShape();
</script>

</body>
</html>
