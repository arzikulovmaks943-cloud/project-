<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  background: radial-gradient(circle, #1a001f, #000);
  font-family: Arial;
}

/* КНОПКА */
#startBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  padding: 45px 90px;
  font-size: 34px;
  border: none;
  border-radius: 40px;
  background: #ff2d55;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 40px #ff2d55;
  z-index: 100;
}

/* частицы */
.particle {
  position: absolute;
  font-size: 6px;
  color: #ff4d6d;
  pointer-events: none;
  will-change: transform;
}

/* текст */
.centerText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
  opacity: 0;
  transition: 1s;
  z-index: 10;
}

.centerText h1 {
  font-size: 55px;
  color: #ff4d6d;
  text-shadow: 0 0 25px #ff4d6d;
  margin: 0;
}
</style>
</head>

<body>

<button id="startBtn">START 💖</button>

<div class="centerText" id="text">
  <h1>LOVE YOU 💖</h1>
</div>

<script>

const btn = document.getElementById("startBtn");
const text = document.getElementById("text");

let particles = [];
let anim;

btn.onclick = start;

function start() {

  btn.style.display = "none";

  const count = 350;

  // СОЗДАНИЕ ЧАСТИЦ (ТОЛЬКО ЦЕНТР)
  for (let i = 0; i < count; i++) {

    let el = document.createElement("div");
    el.className = "particle";
    el.innerText = "LOVE YOU";

    // 🔥 строго центр + небольшой разброс
    let cx = window.innerWidth / 2;
    let cy = window.innerHeight / 2;

    el.x = cx + (Math.random() * 200 - 100);
    el.y = cy + (Math.random() * 200 - 100);

    el.style.transform = `translate(${el.x}px, ${el.y}px)`;

    document.body.appendChild(el);

    particles.push({ el, x: el.x, y: el.y });
  }

  let t = 0;

  // ПЛАВНЫЙ ХАОС ВОКРУГ ЦЕНТРА
  function animate() {

    t += 0.01;

    for (let p of particles) {

      p.x += Math.sin(t + p.y * 0.01) * 0.8;
      p.y += Math.cos(t + p.x * 0.01) * 0.8;

      p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
    }

    anim = requestAnimationFrame(animate);
  }

  animate();

  // СБОРКА В СЕРДЦЕ (ЦЕНТР)
  setTimeout(() => {

    cancelAnimationFrame(anim);

    let cx = window.innerWidth / 2;
    let cy = window.innerHeight / 2;

    particles.forEach((p, i) => {

      let t = i * 0.07;

      // форма сердца
      let x = 16 * Math.pow(Math.sin(t), 3);
      let y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
              - 2 * Math.cos(3*t) - Math.cos(4*t);

      p.el.style.transition = "2s ease";

      p.el.style.transform =
        `translate(${cx + x * 10}px, ${cy - y * 10}px)`;
    });

    // показать текст
    text.style.opacity = 1;

  }, 3000);

}

</script>

</body>
</html>
